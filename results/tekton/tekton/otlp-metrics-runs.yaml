---
# Additional runs to trigger OTLP metrics export
apiVersion: tekton.dev/v1
kind: TaskRun
metadata:
  name: taskrun-otlp-1
  namespace: default
spec:
  taskRef:
    name: echo-task
  params:
  - name: message
    value: "OTLP metrics test run 1"
---
apiVersion: tekton.dev/v1
kind: TaskRun
metadata:
  name: taskrun-otlp-2
  namespace: default
spec:
  taskRef:
    name: multi-step-task
  params:
  - name: name
    value: "OTLP Test"
---
apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  name: pipelinerun-otlp-1
  namespace: default
spec:
  pipelineRef:
    name: simple-pipeline
  params:
  - name: greeting
    value: "OTLP metrics pipeline run"
